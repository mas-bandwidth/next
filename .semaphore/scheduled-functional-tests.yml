version: v1.0

# Weekly scheduled run of the functional tests against main. The functional tests pipeline
# expects relay-debug and libnext.so as workflow artifacts (normally pushed by the Build
# pipeline when a test tag is deployed), so build just those two here, then promote.

name: Scheduled Functional Tests

agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2204

blocks:

  - name: "Components"
    dependencies: []
    task:
      jobs:
        - name: "Build Components"
          commands:
            - sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libsodium-dev
            - checkout
            - mkdir dist
            - make -j ./dist/relay-debug ./dist/libnext.so
            - artifact push workflow ./dist/relay-debug --force
            - artifact push workflow ./dist/libnext.so --force

promotions:

  - name: "Functional Tests"
    pipeline_file: functional-tests.yml
    auto_promote:
      when: "result = 'passed'"
