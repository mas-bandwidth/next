version: v1.0

# Weekly scheduled run of the functional tests against main. The functional tests pipeline
# expects relay-userspace-debug and libnext.so as workflow artifacts (normally pushed by
# the Build pipeline when a test tag is deployed), so build just those here, then promote.

name: Scheduled Functional Tests

agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2204

blocks:

  - name: "Components"
    dependencies: []
    task:
      jobs:
        - name: "Build Components"
          commands:
            - sudo DEBIAN_FRONTEND=noninteractive apt-get update -y
            - sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libsodium-dev libcurl4-openssl-dev
            - checkout
            - mkdir dist
            - make -j ./dist/relay-userspace-debug ./dist/libnext.so
            - artifact push workflow ./dist/relay-userspace-debug --force
            - artifact push workflow ./dist/libnext.so --force
        # weekly vulnerability check so newly published vulns are caught even when
        # nothing is being pushed (the Build pipeline also runs this on every tag)
        - name: "Vulnerability Check"
          commands:
            - sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libsodium-dev
            - checkout
            - go install golang.org/x/vuln/cmd/govulncheck@latest
            - export PATH=$PATH:$(go env GOPATH)/bin
            - govulncheck ./...

promotions:

  - name: "Functional Tests"
    pipeline_file: functional-tests.yml
    auto_promote:
      when: "result = 'passed'"
