version: v1.0

name: Build

fail_fast:
  stop:
    when: "true"

agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2204

blocks:

  - name: "Components"
    dependencies: []
    task:
      jobs:
        - name: "Build Components"
          commands:
            - |
              if [ -z "$SEMAPHORE_GIT_TAG_NAME" ]; then
                export SEMAPHORE_GIT_TAG_NAME relay-userspace-debug
              fi
            # apt update first: installing libcurl4-openssl-dev upgrades curl/libcurl and
            # a stale package index 404s on the mirrors (failed test-276)
            - sudo DEBIAN_FRONTEND=noninteractive apt-get update -y
            - sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libsodium-dev libcurl4-openssl-dev
            - checkout
            - mkdir dist
            # the userspace-mode XDP relay: the same relay_xdp.c datapath as a plain
            # userspace binary (relay/CONSOLIDATION.md). the functional suites run against
            # it, and on relay-* tags it uploads as the ${tag}-debug relay artifact.
            - make RELAY_VERSION=$SEMAPHORE_GIT_TAG_NAME -j ./dist/relay-userspace-debug ./dist/libnext.so
            - artifact push workflow ./dist/relay-userspace-debug --force
            - artifact push workflow ./dist/libnext.so --force
            - artifact push workflow tools/build_artifact/bootstrap.sh --force
            - artifact push workflow config/google.txt --force
            - artifact push workflow config/amazon.txt --force
            - artifact push workflow config/akamai.txt --force
            - artifact push workflow config/unity.txt --force

  - name: "Sodium"
    dependencies: []
    task:
      jobs:
        - name: "Build libsodium.so"
          commands:
            # the built library is cached -- download.libsodium.org DNS/network hiccups
            # have failed builds (test-239). the cache key pins the libsodium version, so
            # bumping the version below automatically rebuilds.
            - cache restore libsodium-1.0.18-so
            - |
              if [ ! -f libsodium.so ]; then
                wget https://download.libsodium.org/libsodium/releases/old/libsodium-1.0.18.tar.gz
                tar -zxf libsodium*
                cd libsodium-1.0.18
                ./configure
                make -j
                sudo make install
                cd ..
                cp /usr/local/lib/libsodium.so libsodium.so
                cache store libsodium-1.0.18-so libsodium.so
              fi
            - ls -al libsodium.so
            - artifact push workflow libsodium.so --force
            
  - name: "Backend"
    dependencies: []
    task:
      jobs:
        - name: "Unit Tests"
          commands:
            - cache restore golang
            - checkout
            - cp envs/local.env .env
            - sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libsodium-dev
            - go test ./modules/...
        # fails the build if any dependency vulnerability is REACHABLE from our code
        # (vulns in required modules we never call do not fail). a failure here with no
        # code change means a new vuln was published -- upgrade the dependency.
        - name: "Vulnerability Check"
          commands:
            - cache restore golang
            - checkout
            - sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libsodium-dev
            - go install golang.org/x/vuln/cmd/govulncheck@latest
            - export PATH=$PATH:$(go env GOPATH)/bin
            - govulncheck ./...

  - name: "SDK"
    dependencies: []
    task:
      jobs:
        - name: "Unit Tests"
          commands:
            - sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libsodium-dev
            - checkout
            - cp envs/local.env .env
            - export LD_LIBRARY_PATH=.
            - mkdir dist
            - make dist/test
            - cd dist && ./test

  - name: "Relay"
    dependencies: []
    task:
      jobs:
        - name: "XDP"
          commands:
            - |
              if [ -z "$SEMAPHORE_GIT_TAG_NAME" ]; then
                export SEMAPHORE_GIT_TAG_NAME relay-release
              fi
            - checkout
            - uname -r
            - sudo DEBIAN_FRONTEND=noninteractive apt update -y
            - sudo DEBIAN_FRONTEND=noninteractive apt install -y build-essential libsodium-dev libcurl4-openssl-dev clang linux-headers-generic linux-headers-`uname -r` linux-tools-`uname -r` libc6-dev-i386 gcc-12 dwarves libelf-dev pkg-config m4 libpcap-dev net-tools
            - sudo cp /sys/kernel/btf/vmlinux /usr/lib/modules/`uname -r`/build/
            - wget https://github.com/xdp-project/xdp-tools/releases/download/v1.4.2/xdp-tools-1.4.2.tar.gz
            - tar -zxf xdp-tools-1.4.2.tar.gz
            - pushd .
            - cd xdp-tools-1.4.2
            - ./configure
            - make -j && sudo make install
            - cd lib/libbpf/src
            - make -j && sudo make install
            - sudo ldconfig
            - popd
            - pushd .
            - cd relay/xdp && make RELAY_VERSION=$SEMAPHORE_GIT_TAG_NAME -j build
            - mv relay relay-release
            - artifact push workflow relay-release --force
            - make relay_xdp.o
            - popd
            # tar the module artifact BEFORE building the module below, so the tarball
            # doesn't pick up build products
            - cd relay/module && tar -zcvf relay_module.tar.gz *
            - artifact push workflow ./relay_module.tar.gz --force
            # run relay_xdp.o through the BPF verifier. compiling it proves nothing -- the
            # verifier only runs at BPF_PROG_LOAD time, and it is what rejects a restructured
            # filter. relay_xdp.c calls the bpf_relay_sha256 kfunc, so the relay kernel module
            # must be built and insmodded first or the load fails before the verifier even
            # runs (unresolved kfunc -- that was the EINVAL xdp-loader misreported as an
            # attach failure). the lsmod assert double-checks the module actually loaded.
            # bpftool prog load runs the verifier without a device attach (attach is
            # driver dependent; prod attaches native mode on real NICs). a verifier rejection
            # fails the job and prints the verifier log.
            - make module
            - lsmod | grep relay_module
            - mountpoint -q /sys/fs/bpf || sudo mount -t bpf bpf /sys/fs/bpf
            - sudo bpftool prog load ../xdp/relay_xdp.o /sys/fs/bpf/relay_xdp_test type xdp
            - sudo bpftool prog show pinned /sys/fs/bpf/relay_xdp_test
            # SPIKE (relay consolidation step 1): prove BPF_PROG_RUN can drive the real
            # relay_xdp.o with populated maps and read back verdicts. two crypto-free cases.
            # if green, a wire-conformance corpus can be fired at the actual bpf object in CI.
            # static-link the libbpf.a built inside the xdp-tools source tree above -- its
            # install location varies and is outside the ldconfig paths
            - cd ../xdp && gcc -O2 -o prog_test_run prog_test_run.c ../../xdp-tools-1.4.2/lib/libbpf/src/libbpf.a -lelf -lz
            - sudo ./prog_test_run relay_xdp.o
            # relay conformance differential: fire the relaycorpus corpus (world + packets)
            # at the real relay_xdp.o via BPF_PROG_RUN and check every entry's XDP action
            # and counter against the Go oracle. covers the stateful handlers -- tokens,
            # sessions, whitelist -- not just the filters. see modules/relaycorpus and
            # relay/CONSOLIDATION.md.
            - gcc -O2 -o relay_corpus_diff relay_corpus_diff.c ../../xdp-tools-1.4.2/lib/libbpf/src/libbpf.a -lelf -lz
            - ( cd ../.. && go run ./cmd/relaycorpus_gen relay/xdp/corpus.bin )
            - sudo ./relay_corpus_diff relay_xdp.o corpus.bin
            # relay consolidation: prove the SAME datapath source (relay_xdp.c) compiled as
            # userspace C (non-BPF, -DRELAY_USERSPACE + relay_userspace.h) produces identical
            # action+counter outcomes on the same corpus. this is the userspace relay mode
            # that replaced the reference relay -- one relay source. no BPF needed to run it.
            - make userspace-test
            - ./relay_userspace_test corpus.bin
            # windows build of the userspace relay (dev/test only, never production --
            # see relay/CONSOLIDATION.md): cross compile with mingw-w64 against the
            # prebuilt mingw libsodium (cached; bump the version in the cache key to
            # force a refresh), then smoke test the exe under wine -- it must start,
            # initialize winsock, and fail with the expected config error.
            - sudo DEBIAN_FRONTEND=noninteractive apt-get install -y gcc-mingw-w64-x86-64 wine64
            - cache restore libsodium-1.0.18-mingw
            - |
              if [ ! -d libsodium-win64 ]; then
                wget https://download.libsodium.org/libsodium/releases/old/libsodium-1.0.18-mingw.tar.gz
                tar -zxf libsodium-1.0.18-mingw.tar.gz
                cache store libsodium-1.0.18-mingw libsodium-win64
              fi
            - make userspace-windows SODIUM_WIN=./libsodium-win64
            - wine64 relay-userspace.exe 2>&1 | tee wine_smoke.txt || true
            - grep -q "RELAY_NAME not set" wine_smoke.txt

  - name: "Portal"
    dependencies: []
    task:
      jobs:
        - name: "Build Portal"
          commands:
            - checkout
            # vite 8 needs node >= 22.12 (and babel 8 in the vue toolchain needs >= 22.18)
            - sem-version node 24
            - cd portal
            - yarn install
            - cd ..
            - go run tools/build_portal/build_portal.go $SEMAPHORE_GIT_TAG_NAME $SEMAPHORE_GIT_BRANCH
            - cd portal/dist
            - tar -zcvf portal.tar.gz *
            - artifact push workflow portal.tar.gz --force
            - cd ../..
            - artifact push workflow tools/build_artifact/nginx.conf --force

  - name: "Build Artifacts (Golang)"

    dependencies: []

    task:

      prologue:
        commands:
            - sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libsodium-dev
            - checkout
            - cache restore golang
            - make update-schemas

      jobs:

        - name: "API"
          commands:
            - make dist/api.tar.gz
            - artifact push workflow dist/api.tar.gz --force

        - name: "Autodetect"
          commands:
            - make dist/autodetect.tar.gz
            - artifact push workflow dist/autodetect.tar.gz --force

        - name: "Session Cruncher"
          commands:
            - make dist/session_cruncher.tar.gz
            - artifact push workflow dist/session_cruncher.tar.gz --force

        - name: "Server Cruncher"
          commands:
            - make dist/server_cruncher.tar.gz
            - artifact push workflow dist/server_cruncher.tar.gz --force

        - name: "Relay Gateway"
          commands:
            - make dist/relay_gateway.tar.gz
            - artifact push workflow dist/relay_gateway.tar.gz --force

        - name: "Relay Backend"
          commands:
            - make dist/relay_backend.tar.gz
            - artifact push workflow dist/relay_backend.tar.gz --force

        - name: "Server Backend"
          commands:
            - make dist/server_backend.tar.gz
            - artifact push workflow dist/server_backend.tar.gz --force

        - name: "Magic Backend"
          commands:
            - make dist/magic_backend.tar.gz
            - artifact push workflow dist/magic_backend.tar.gz --force

        - name: "Raspberry Backend"
          commands:
            - make dist/raspberry_backend.tar.gz
            - artifact push workflow dist/raspberry_backend.tar.gz --force

        - name: "IP2Location"
          commands:
            - make dist/ip2location.tar.gz
            - artifact push workflow dist/ip2location.tar.gz --force

        - name: "Load Test Relays"
          commands:
            - make dist/load_test_relays.tar.gz
            - artifact push workflow dist/load_test_relays.tar.gz --force

        - name: "Load Test Servers"
          commands:
            - make dist/load_test_servers.tar.gz
            - artifact push workflow dist/load_test_servers.tar.gz --force

        - name: "Load Test Sessions"
          commands:
            - make dist/load_test_sessions.tar.gz
            - artifact push workflow dist/load_test_sessions.tar.gz --force

  - name: "Build Artifacts (Native)"

    dependencies: []

    task:

      prologue:
        commands:
            - sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libsodium-dev
            - checkout
            - mkdir dist

      jobs:

        - name: "Client"
          commands:
            - make -j dist/client.tar.gz
            - artifact push workflow dist/client.tar.gz --force

        - name: "Server"
          commands:
            - make -j dist/server.tar.gz
            - artifact push workflow dist/server.tar.gz --force

        - name: "Raspberry Client"
          commands:
            - make -j dist/raspberry_client.tar.gz
            - artifact push workflow dist/raspberry_client.tar.gz --force

        - name: "Raspberry Server"
          commands:
            - make -j dist/raspberry_server.tar.gz
            - artifact push workflow dist/raspberry_server.tar.gz --force

promotions:

  - name: "SDK Tests"
    pipeline_file: sdk-tests.yml
    auto_promote:
      when: "result = 'passed' and tag =~ 'test'"

  - name: "Functional Tests"
    pipeline_file: functional-tests.yml
    auto_promote:
      when: "result = 'passed' and tag =~ 'test'"

  - name: "Happy Path"
    pipeline_file: happy-path.yml
    auto_promote:
      when: "result = 'passed' and tag =~ 'test'"

  - name: "Upload Artifacts"
    pipeline_file: upload-artifacts.yml
    auto_promote:
      when: "result = 'passed' and tag =~ '(dev|staging|prod)'"

  - name: "Upload Config"
    pipeline_file: upload-config.yml
    auto_promote:
      when: "result = 'passed' and tag =~ 'config'"

  - name: "Upload Relay"
    pipeline_file: upload-relay.yml
    auto_promote:
      when: "result = 'passed' and tag =~ 'relay'"

  - name: "Update Golang Cache"
    pipeline_file: update-golang-cache.yml
